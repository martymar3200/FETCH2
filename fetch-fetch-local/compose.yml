networks:
    fetch:
        name: fetch
        driver: bridge

volumes:
    inventory-database-volume:
    fetch-pgadmin-volume:
    # inventory-cache-volume:
    # redis-config:

services:
    inventory-database:
        build:
            context: ../fetch-database/inventory
            dockerfile: images/inventory.db.local.Containerfile
        container_name: inventory-database
        volumes:
            - inventory-database-volume:/var/lib/postgresql/data
        networks:
            - fetch
        ports: 
            - "5432:5432"
        shm_size: "2g"  # keep even for normal usage
        # on dev branch, we try to keep these matching the prod db pg engine settings
        command: >
            postgres
            -c work_mem=48MB
            -c shared_buffers=3GB
            -c effective_cache_size=8GB
            -c maintenance_work_mem=256MB
            -c checkpoint_completion_target=0.9
            -c checkpoint_timeout=10min
            -c wal_buffers=16MB
            -c max_wal_size=2GB
            -c wal_compression=on
            -c full_page_writes=on
            -c default_statistics_target=100

            -c statement_timeout=300s
            -c idle_in_transaction_session_timeout=35s
            -c deadlock_timeout=1s
            -c max_worker_processes=8
            -c max_parallel_workers=8
            -c max_parallel_workers_per_gather=2
            -c autovacuum_max_workers=3
            -c autovacuum_naptime=1min
            -c autovacuum_vacuum_cost_limit=-1
            -c autovacuum_vacuum_threshold=50
            -c autovacuum_vacuum_scale_factor=0.2
            -c max_connections=500


    pgadmin:
        build:
          context: ../fetch-database/pgadmin
          dockerfile: images/pgadmin.local.Containerfile
        container_name: fetch-pgadmin4
        networks:
            - fetch
        environment:
            - PGADMIN_DEFAULT_EMAIL=admin@fetch.example.com
            - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
        ports:
            - "5050:80"
        volumes:
          - fetch-pgadmin-volume:/var/lib/pgadmin
    inventory-api:
        build:
            context: ../fetch-inventory_service
            dockerfile: images/api.local.Containerfile
        container_name: fetch-inventory-api
        environment:
            - SECRET_KEY=${FETCH_SECRET_KEY:-local-dev-secret-key}
            - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@inventory-database:5432/inventory_service}
            - MIGRATION_URL=${MIGRATION_URL:-postgresql://postgres:postgres@inventory-database:5432/inventory_service}
        volumes:
            - ../fetch-inventory_service:/code:rw
            - ./logs:/code/app/logs:rw
            - ./.certs:/code/certs:ro
        networks:
            - fetch
        depends_on:
            - inventory-database
        ports:
            - "8001:8001"
