---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vue
  namespace: fetch
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vue
  template:
    metadata:
      labels:
        app: vue
    spec:
      containers:
        - name: vue
          # UPDATE: Replace with your container registry URL
          image: YOUR_REGISTRY/fetch/web-app:latest
          imagePullPolicy: Always
          ports:
          - containerPort: 80
          # Liveness probe — restart if NGINX stops responding
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness probe — stop routing traffic if not ready
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
              ephemeral-storage: "50Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "200Mi"
      imagePullSecrets:
      - name: registry-credentials
